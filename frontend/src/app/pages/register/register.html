<div class="auth-container">
  <form class="card auth-card" #registerForm="ngForm" (ngSubmit)="registerForm.form.valid && onRegister()">
    <h2>Create Account</h2>

    <div *ngIf="errorMessage" class="alert alert-danger">
      {{ errorMessage }}
    </div>

    <app-form-field label="Username *" errorMessage="Username is required (min 3 chars).">
      <input type="text"
             class="form-control"
             name="username"
             [(ngModel)]="registerData.username"
             required
             minlength="3"
             #username="ngModel"
             [class.is-invalid]="username.invalid && (username.dirty || username.touched)" />
    </app-form-field>

    <app-form-field label="Email *" errorMessage="Please enter a valid email address.">
      <input type="email"
             class="form-control"
             name="email"
             [(ngModel)]="registerData.email"
             required
             email
             #email="ngModel"
             [class.is-invalid]="email.invalid && (email.dirty || email.touched)" />
    </app-form-field>

    <app-form-field label="Password *" errorMessage="Password must be at least 6 characters long.">
      <input type="password"
             class="form-control"
             name="password"
             [(ngModel)]="registerData.password"
             required
             minlength="6"
             #password="ngModel"
             [class.is-invalid]="password.invalid && (password.dirty || password.touched)" />
    </app-form-field>

    <div class="form-row">
      <app-form-field label="First Name">
        <input type="text" class="form-control" name="firstName" [(ngModel)]="registerData.firstName" />
      </app-form-field>

      <app-form-field label="Last Name">
        <input type="text" class="form-control" name="lastName" [(ngModel)]="registerData.lastName" />
      </app-form-field>
    </div>

    <app-form-field label="Bio">
      <textarea class="form-control" rows="2" name="bio" [(ngModel)]="registerData.bio" placeholder="Tell us about yourself..."></textarea>
    </app-form-field>

    <app-button type="submit" [disabled]="!!registerForm.invalid">Sign Up</app-button>

    <p class="auth-redirect">
      Already have an account? <a routerLink="/login">Sign In</a>
    </p>
  </form>
</div>

<app-navbar></app-navbar>
<div class="page-container">
  <div class="split-layout">
    <form class="card form-section" #logForm="ngForm" (ngSubmit)="logForm.form.valid && saveLog()">
      <h2>{{ isEditMode ? 'Modify Tour Log' : 'Create Tour Log' }}</h2>

      <app-form-field label="Select Tour *" errorMessage="Required.">
        <select
          class="form-control"
          name="tourId"
          [(ngModel)]="tourLog.tourId"
          (change)="updateLogName()"
          required
          #tourId="ngModel"
          [class.is-invalid]="tourId.invalid && (tourId.dirty || tourId.touched)"
        >
          <option value="" disabled selected>Select a tour</option>
          @for (t of tours; track t.tourId) {
            <option [value]="t.tourId">{{ t.name }}</option>
          }
        </select>
      </app-form-field>

      <app-form-field label="Date *" errorMessage="Must be a valid past or current date.">
        <input
          type="date"
          class="form-control"
          name="dateTime"
          [(ngModel)]="tourLog.dateTime"
          required
          [max]="todayDate"
          #dateTime="ngModel"
          [class.is-invalid]="dateTime.invalid && (dateTime.dirty || dateTime.touched)"
        />
      </app-form-field>

      <div class="form-row">
        <app-form-field label="Distance (km) *" errorMessage="Distance must be > 0.">
          <input
            type="number"
            class="form-control"
            name="totalDistance"
            [(ngModel)]="tourLog.totalDistance"
            placeholder="Distance"
            required
            min="0.1"
            #dist="ngModel"
            [class.is-invalid]="dist.invalid && (dist.dirty || dist.touched)"
          />
        </app-form-field>

        <app-form-field label="Time (hrs) *" errorMessage="Time must be > 0.">
          <input
            type="number"
            class="form-control"
            name="totalTime"
            [(ngModel)]="tourLog.totalTime"
            placeholder="Time"
            required
            min="0.1"
            #time="ngModel"
            [class.is-invalid]="time.invalid && (time.dirty || time.touched)"
          />
        </app-form-field>
      </div>

      <div class="form-row">
        <app-form-field label="Difficulty *" errorMessage="Required.">
          <select
            class="form-control"
            name="difficulty"
            [(ngModel)]="tourLog.difficulty"
            required
            #diff="ngModel"
            [class.is-invalid]="diff.invalid && (diff.dirty || diff.touched)"
          >
            <option value="" disabled selected>Choose difficulty</option>
            <option value="Easy">Easy</option>
            <option value="Medium">Medium</option>
            <option value="Hard">Hard</option>
          </select>
        </app-form-field>

        <app-form-field label="Rating *" errorMessage="Required.">
          <select
            class="form-control"
            name="rating"
            [(ngModel)]="tourLog.rating"
            required
            #rating="ngModel"
            [class.is-invalid]="rating.invalid && (rating.dirty || rating.touched)"
          >
            <option value="0" disabled selected>Rate your tour</option>
            <option value="1">1 - Poor</option>
            <option value="2">2 - Fair</option>
            <option value="3">3 - Good</option>
            <option value="4">4 - Very Good</option>
            <option value="5">5 - Excellent</option>
          </select>
        </app-form-field>
      </div>

      <app-image-upload
        label="Log Image"
        [isEditMode]="isEditMode"
        [previewUrl]="previewUrl"
        [submitted]="logForm.submitted"
        (fileSelected)="onImageSelected($event)"
      >
      </app-image-upload>

      <app-form-field label="Notes">
        <textarea
          class="form-control"
          rows="3"
          name="comment"
          [(ngModel)]="tourLog.comment"
          placeholder="Enter notes"
        ></textarea>
      </app-form-field>

      <app-button type="submit" [disabled]="logForm.invalid || tourLog.rating == 0">Save Log</app-button>

    </form>

    <div class="placeholder-box">
      <span>Summary Preview for: {{ tourLog.name || '?' }}</span>
    </div>
  </div>
</div>

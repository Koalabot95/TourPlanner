<app-navbar></app-navbar>
<div class="page-container">
  <div class="split-layout">
    <form class="card form-section" (ngSubmit)="saveLog()">
      <h2>Create Tour Log</h2>

      <div class="form-group">
        <label>Tour</label>
        <select class="form-control" name="name" [(ngModel)]="tourLog.name">
          <option value="Mountain Trail">Mountain Trail</option>
          <option value="City Tour">City Tour</option>
          <option value="Lakeside Walk">Lakeside Walk</option>
          <option value="Forest Hike">Forest Hike</option>
        </select>
      </div>

      <div class="form-group">
        <label>Date</label>
        <input type="date" class="form-control" name="dateTime" [(ngModel)]="tourLog.dateTime" />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Distance (km)</label>
          <input
            type="number"
            class="form-control"
            name="totalDistance"
            [(ngModel)]="tourLog.totalDistance"
            placeholder="Enter distance"
          />
        </div>
        <div class="form-group">
          <label>Time (hrs)</label>
          <input
            type="number"
            class="form-control"
            name="totalTime"
            [(ngModel)]="tourLog.totalTime"
            placeholder="Enter time"
          />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Difficulty</label>
          <select class="form-control" name="difficulty" [(ngModel)]="tourLog.difficulty">
            <option value="Easy">Easy</option>
            <option value="Medium">Medium</option>
            <option value="Hard">Hard</option>
          </select>
        </div>
        <div class="form-group">
          <label>Rating</label>
          <select class="form-control" name="rating" [(ngModel)]="tourLog.rating">
            <option value="1">1 - Poor</option>
            <option value="2">2 - Fair</option>
            <option value="3">3 - Good</option>
            <option value="4">4 - Very Good</option>
            <option value="5">5 - Excellent</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>Notes</label>
        <textarea
          class="form-control"
          rows="3"
          name="comment"
          [(ngModel)]="tourLog.comment"
          placeholder="Enter any notes about the tour"
        ></textarea>
      </div>

      <app-button type="submit">Save Log</app-button>
    </form>

    <div class="image-preview">
      <span>Image Preview for: {{ tourLog.name || '?' }}</span>
    </div>
  </div>
</div>

<app-navbar></app-navbar>
<div class="page-container">
  <div class="split-layout">
    <form class="card form-section" (ngSubmit)="saveTour()">
      <h2>Create Tour</h2>

      <div class="form-group">
        <label>Tour Name</label>
        <input
          type="text"
          class="form-control"
          name="name"
          [(ngModel)]="tour.name"
          placeholder="Enter tour name"
          required
        />
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea
          class="form-control"
          rows="3"
          name="description"
          [(ngModel)]="tour.description"
          placeholder="Enter description"
        ></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>From</label>
          <input
            type="text"
            class="form-control"
            name="startLocation"
            [(ngModel)]="tour.startLocation"
            placeholder="Start location"
          />
        </div>

        <div class="form-group">
          <label>To</label>
          <input
            type="text"
            class="form-control"
            name="endLocation"
            [(ngModel)]="tour.endLocation"
            placeholder="End location"
          />
        </div>
      </div>

      <div class="form-group">
        <label>Choose Transport Type</label>
        <select class="form-control" name="transportType" [(ngModel)]="tour.transportType">
          <option value="Hike">Hike</option>
          <option value="Bike">Bike</option>
          <option value="Running">Running</option>
          <option value="Vacation">Vacation</option>
        </select>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Begin Date</label>
          <input type="date" class="form-control" name="startDate" [(ngModel)]="tour.startDate" />
        </div>
        <div class="form-group">
          <label>End Date</label>
          <input type="date" class="form-control" name="endDate" [(ngModel)]="tour.endDate" />
        </div>
      </div>

      <div class="form-group">
        <label>Tour Image</label>
        <input
          type="file"
          class="form-control"
          name="imageFile"
          accept="image/*"
          (change)="onFileSelected($event)"
        />

        @if (previewUrl) {
          <div class="image-preview-small">
            <img
              [src]="previewUrl"
              alt="Preview"
              style="max-width: 100%; max-height: 200px; margin-top: 10px; border-radius: 4px"
            />
          </div>
        }
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Distance</label>
          <input
            type="text"
            class="form-control bg-gray"
            [value]="tour.distance ? tour.distance + ' km' : 'Auto-calculated'"
            disabled
          />
        </div>
        <div class="form-group">
          <label>Est. Time</label>
          <input
            type="text"
            class="form-control bg-gray"
            [value]="tour.estimatedTime ? tour.estimatedTime + ' hrs' : 'Auto-calculated'"
            disabled
          />
        </div>
      </div>

      <app-button type="submit">Save Tour</app-button>
    </form>

    <div class="map-preview">
      <span>Map Preview for: {{ tour.startLocation || '?' }} to {{ tour.endLocation || '?' }}</span>
    </div>
  </div>
</div>

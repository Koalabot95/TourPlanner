<div class="login-wrapper">
  <form class="card login-card" (ngSubmit)="login()">
    <h2 class="title">Welcome Back</h2>

    @if (errorMessage) {
      <div class="error-banner">
        {{ errorMessage }}
      </div>
    }

    <div class="form-group">
      <label>Username</label>
      <input
        type="text"
        class="form-control"
        name="username"
        [(ngModel)]="credentials.username"
        placeholder="Enter username"
        required
      />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input
        type="password"
        class="form-control"
        name="password"
        [(ngModel)]="credentials.password"
        placeholder="Enter password"
        required
      />
    </div>

    <!-- <app-button variant="primary" type="submit"> Sign In </app-button> -->
     <app-button variant="primary" (click)="redirect()"> Sign In </app-button>
    

    <p class="signup-prompt">Need an account? <a routerLink="/register">Sign up</a></p>
  </form>
</div>

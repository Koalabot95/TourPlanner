<div class="login-wrapper">
  <form class="card login-card" #loginForm="ngForm" (ngSubmit)="loginForm.form.valid && login()">
    <h2 class="title">Welcome Back</h2>

    @if (errorMessage) {
    <div class="error-banner">
      {{ errorMessage }}
    </div>
    }

    <div class="form-group">
      <label>Username *</label>
      <input type="text"
             class="form-control"
             name="username"
             [(ngModel)]="credentials.username"
             placeholder="Enter username"
             required
             #username="ngModel"
             [class.is-invalid]="username.invalid && (username.dirty || username.touched)" />
    </div>

    <div class="form-group">
      <label>Password *</label>
      <input type="password"
             class="form-control"
             name="password"
             [(ngModel)]="credentials.password"
             placeholder="Enter password"
             required
             #password="ngModel"
             [class.is-invalid]="password.invalid && (password.dirty || password.touched)" />
    </div>

    <app-button type="button" variant="primary" [disabled]="!!loginForm.invalid" (buttonClick)="loginForm.form.valid && login()">
      Log In
    </app-button>

    <p class="signup-prompt">Need an account? <a routerLink="/register">Sign up here</a></p>


  </form>
</div>

<div class="card" [ngClass]="customClass">
  @if (title) {
    <div class="card-header">
      <h3 class="card-title">{{ title }}</h3>
      <ng-content select="[card-header-actions]"></ng-content>
    </div>
  }
  <!-- Main Content -->
  <div class="card-body">
    <ng-content></ng-content>
  </div>
</div>
